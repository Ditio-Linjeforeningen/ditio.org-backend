spring.config.import=optional:file:.env[.properties]

spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info, flyway
management.endpoint.health.show-details=always
logging.level.org.flywaydb=INFO

spring.profiles.active=${DEV_profile:dev}
otp.secret=${OTP_CONFIG:passord}
otp.secret.isBase32=${OTP_CONFIG_STATUS:false}

# Registration details (from Feide Customer Portal)
spring.security.oauth2.client.registration.feide.client-id=${FEIDE_CLIENT_ID}
spring.security.oauth2.client.registration.feide.client-secret=${FEIDE_CLIENT_SECRET}
spring.security.oauth2.client.registration.feide.scope=openid,userid,email,profile
spring.security.oauth2.client.registration.feide.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.feide.redirect-uri=http://localhost:8080/login/callback

# Provider details
spring.security.oauth2.client.provider.feide.issuer-uri=https://auth.dataporten.no